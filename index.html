<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Marginalia — read together</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAFAF8;
    --ink:#1F2421;
    --ink-soft:#5B5F5A;
    --line:#E2E0D8;
    --accent:#2F5D50;
    --accent-soft:#E7EFEC;
    --mark:#E8A33D;
    --mark-soft:#FBEFDB;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:"Inter",system-ui,sans-serif; font-size:15px; line-height:1.5;
  }
  .wrap{max-width:720px; margin:0 auto; padding:24px 20px 80px;}
  header{
    display:flex; align-items:baseline; justify-content:space-between;
    border-bottom:1px solid var(--line); padding-bottom:16px; margin-bottom:24px;
  }
  header h1{
    font-family:"Source Serif 4",serif; font-weight:600; font-size:22px; margin:0;
  }
  header h1 span{color:var(--accent);}
  #auth-area{font-size:13px; color:var(--ink-soft);}
  #auth-area button, #auth-area a{cursor:pointer;}
  section{margin-bottom:28px;}
  h2{font-family:"Source Serif 4",serif; font-size:16px; font-weight:600; margin:0 0 10px;}
  label{display:block; font-size:12px; color:var(--ink-soft); margin-bottom:4px; font-weight:500;}
  input[type=text], input[type=email], input[type=number], textarea, select{
    width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:8px;
    font-family:inherit; font-size:14px; background:#fff; color:var(--ink);
  }
  textarea{resize:vertical; min-height:60px;}
  .row{display:flex; gap:10px;}
  .row > *{flex:1;}
  button.primary{
    background:var(--accent); color:#fff; border:none; border-radius:8px;
    padding:9px 16px; font-size:14px; font-weight:500; cursor:pointer;
  }
  button.primary:hover{opacity:.92;}
  button.ghost{
    background:none; border:1px solid var(--line); border-radius:8px;
    padding:8px 14px; font-size:13px; cursor:pointer; color:var(--ink);
  }
  .field{margin-bottom:10px;}
  .card{
    border:1px solid var(--line); border-radius:var(--radius); padding:16px; background:#fff;
  }
  #book-picker{display:flex; gap:8px; align-items:flex-end;}
  #book-picker .field{flex:1; margin-bottom:0;}
  .comment{
    border-left:3px solid var(--mark); padding:12px 14px; margin-bottom:14px;
    background:#fff; border-radius:0 8px 8px 0;
  }
  .comment.chapter-end{border-left-color:var(--accent); background:var(--accent-soft);}
  .excerpt{
    font-family:"Source Serif 4",serif; font-size:15px; background:var(--mark-soft);
    padding:8px 10px; border-radius:6px; margin-bottom:8px; color:#3A2E14;
  }
  .meta{font-size:12px; color:var(--ink-soft); margin-bottom:4px; display:flex; gap:8px; align-items:center;}
  .pct{
    display:inline-block; min-width:38px; text-align:center; font-size:11px;
    background:var(--accent); color:#fff; border-radius:10px; padding:1px 7px;
  }
  .group-tag{font-size:11px; color:var(--accent); border:1px solid var(--accent); border-radius:10px; padding:1px 7px;}
  .empty{color:var(--ink-soft); font-size:13px; padding:16px 0;}
  #groups-list{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px;}
  .chip{font-size:12px; border:1px solid var(--line); border-radius:14px; padding:4px 10px; background:#fff;}
  .hidden{display:none;}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>margin<span>alia</span></h1>
    <div id="auth-area"></div>
  </header>

  <section id="signed-out-msg" class="card">
    <p>Sign in with your email to read and leave comments. No password — we'll email you a link.</p>
  </section>

  <div id="app" class="hidden">

    <section>
      <h2>What are you reading?</h2>
      <div id="book-picker">
        <div class="field">
          <label for="book-search">Book title</label>
          <input type="text" id="book-search" placeholder="Start typing a title…">
        </div>
        <div class="field">
          <label for="book-author">Author</label>
          <input type="text" id="book-author" placeholder="Optional">
        </div>
        <button class="primary" id="select-book-btn">Use this book</button>
      </div>
      <div id="current-book" class="meta" style="margin-top:8px;"></div>
    </section>

    <section id="groups-section">
      <h2>Your groups</h2>
      <div id="groups-list"></div>
      <div class="row">
        <div class="field">
          <input type="text" id="new-group-name" placeholder="New book club name">
        </div>
        <button class="ghost" id="create-group-btn">Create group</button>
      </div>
      <div class="row" style="margin-top:8px;">
        <div class="field">
          <input type="text" id="join-code" placeholder="Have an invite code?">
        </div>
        <button class="ghost" id="join-group-btn">Join group</button>
      </div>
    </section>

    <section id="composer-section" class="card hidden">
      <h2>Leave a comment</h2>
      <div class="field">
        <label for="anchor-text">The passage you're reacting to</label>
        <textarea id="anchor-text" placeholder="Paste or type the sentence or two you want to talk about…"></textarea>
      </div>
      <div class="row">
        <div class="field">
          <label for="position-percent">Roughly how far into the book (%)</label>
          <input type="number" id="position-percent" min="0" max="100" value="0">
        </div>
        <div class="field">
          <label for="visibility-select">Who can see this</label>
          <select id="visibility-select">
            <option value="">Everyone</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label><input type="checkbox" id="is-chapter-end"> This is an end-of-chapter thought</label>
      </div>
      <div class="field">
        <label for="comment-body">Your comment</label>
        <textarea id="comment-body" placeholder="What do you think?"></textarea>
      </div>
      <button class="primary" id="post-comment-btn">Post</button>
    </section>

    <section id="feed-section" class="hidden">
      <h2>Comments on this book</h2>
      <div id="comment-feed"></div>
    </section>

  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';


const SUPABASE_URL = 'https://qbutkzlhgpnnbwdqnriy.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_ojumBWFsUDwVskWjRr18dQ_o-YnHO9f';

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const $ = (id) => document.getElementById(id);
let currentUser = null;
let currentBook = null;
let myGroups = [];

// ---------- Auth ----------
async function renderAuth() {
  const { data: { user } } = await supabase.auth.getUser();
  currentUser = user;
  const area = $('auth-area');
  if (user) {
    area.innerHTML = `${user.email} &nbsp; <button class="ghost" id="signout-btn">Sign out</button>`;
    $('signout-btn').onclick = () => supabase.auth.signOut().then(() => location.reload());
    $('signed-out-msg').classList.add('hidden');
    $('app').classList.remove('hidden');
    loadMyGroups();
  } else {
    area.innerHTML = `
      <input type="email" id="email-input" placeholder="you@example.com" style="width:170px; display:inline-block;">
      <button class="ghost" id="magic-link-btn">Send link</button>`;
    $('magic-link-btn').onclick = async () => {
      const email = $('email-input').value.trim();
      if (!email) return;
      const { error } = await supabase.auth.signInWithOtp({ email });
      $('auth-area').innerHTML = error ? `Error: ${error.message}` : 'Check your email for a sign-in link.';
    };
    $('signed-out-msg').classList.remove('hidden');
    $('app').classList.add('hidden');
  }
}

// ---------- Books ----------
$('select-book-btn').onclick = async () => {
  const title = $('book-search').value.trim();
  const author = $('book-author').value.trim();
  if (!title) return;

  // Look for an existing book with this title first, so people land on the
  // same thread instead of splitting comments across duplicate rows.
  let { data: existing } = await supabase
    .from('books').select('*').ilike('title', title).limit(1);

  let book = existing && existing[0];
  if (!book) {
    const { data, error } = await supabase
      .from('books').insert({ title, author }).select().single();
    if (error) { alert(error.message); return; }
    book = data;
  }
  currentBook = book;
  $('current-book').textContent = `Reading: ${book.title}${book.author ? ' — ' + book.author : ''}`;
  $('composer-section').classList.remove('hidden');
  $('feed-section').classList.remove('hidden');
  loadComments();
};

// ---------- Groups ----------
async function loadMyGroups() {
  const { data: memberships } = await supabase
    .from('group_members').select('group_id, groups(id, name, invite_code)').eq('user_id', currentUser.id);
  myGroups = (memberships || []).map(m => m.groups).filter(Boolean);
  renderGroups();
}

function renderGroups() {
  $('groups-list').innerHTML = myGroups.length
    ? myGroups.map(g => `<span class="chip">${g.name} · code ${g.invite_code}</span>`).join('')
    : '<span class="empty">No groups yet — create one or join with a code.</span>';

  const select = $('visibility-select');
  select.innerHTML = '<option value="">Everyone</option>' +
    myGroups.map(g => `<option value="${g.id}">${g.name} only</option>`).join('');
}

$('create-group-btn').onclick = async () => {
  const name = $('new-group-name').value.trim();
  if (!name) return;
  const invite_code = Math.random().toString(36).slice(2, 8).toUpperCase();
  const { data, error } = await supabase
    .from('groups').insert({ name, invite_code, created_by: currentUser.id }).select().single();
  if (error) { alert(error.message); return; }
  await supabase.from('group_members').insert({ group_id: data.id, user_id: currentUser.id });
  $('new-group-name').value = '';
  loadMyGroups();
};

$('join-group-btn').onclick = async () => {
  const code = $('join-code').value.trim().toUpperCase();
  if (!code) return;
  const { error } = await supabase.rpc('join_group_by_code', { code });
  if (error) { alert(error.message); return; }
  $('join-code').value = '';
  loadMyGroups();
};

// ---------- Comments ----------
$('post-comment-btn').onclick = async () => {
  if (!currentBook) return;
  const anchor_text = $('anchor-text').value.trim();
  const body = $('comment-body').value.trim();
  const position_percent = Number($('position-percent').value) || 0;
  const group_id = $('visibility-select').value || null;
  const is_chapter_end = $('is-chapter-end').checked;
  if (!anchor_text || !body) return;

  const { error } = await supabase.from('comments').insert({
    book_id: currentBook.id, user_id: currentUser.id, group_id,
    anchor_text, body, position_percent, is_chapter_end
  });
  if (error) { alert(error.message); return; }

  $('anchor-text').value = '';
  $('comment-body').value = '';
  $('is-chapter-end').checked = false;
  loadComments();
};

async function loadComments() {
  // RLS does the visibility filtering server-side — this query only ever
  // returns rows the signed-in user is actually allowed to see.
  const { data, error } = await supabase
    .from('comments')
    .select('*, groups(name)')
    .eq('book_id', currentBook.id)
    .order('position_percent', { ascending: true });

  const feed = $('comment-feed');
  if (error) { feed.innerHTML = `<p class="empty">${error.message}</p>`; return; }
  if (!data.length) { feed.innerHTML = '<p class="empty">No comments yet — be the first.</p>'; return; }

  feed.innerHTML = data.map(c => `
    <div class="comment ${c.is_chapter_end ? 'chapter-end' : ''}">
      <div class="meta">
        <span class="pct">${c.position_percent}%</span>
        ${c.is_chapter_end ? '<span class="group-tag">end of chapter</span>' : ''}
        ${c.groups ? `<span class="group-tag">${c.groups.name}</span>` : ''}
      </div>
      <div class="excerpt">"${escapeHtml(c.anchor_text)}"</div>
      <div>${escapeHtml(c.body)}</div>
    </div>
  `).join('');
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

renderAuth();
supabase.auth.onAuthStateChange(() => renderAuth());
</script>
</body>
</html>
